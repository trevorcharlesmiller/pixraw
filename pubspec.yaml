name: pixraw
description: "PixRAW is a simple and easy to use RAW photo viewer and culling desktop application."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  file_picker: ^11.0.2
  window_manager: ^0.5.2
  flutter_libraw:
    git:
      url: https://github.com/trevorcharlesmiller/flutter-libraw.git
  path: ^1.9.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon-128.png
  fonts:
    - family: Nunito # This is the name you will use in your code
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
